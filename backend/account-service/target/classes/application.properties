# Service Configuration
server.port=${PORT:8081}
spring.application.name=account-service

# Database Configuration (Auto-detects Railway or Local)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/pob_bank}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:your_strong_password}

# SAFE DATA HANDLING - Change from 'create-drop' to 'update'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Performance Tuning for 1M+ Records
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true